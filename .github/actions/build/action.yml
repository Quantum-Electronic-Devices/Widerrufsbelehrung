name: "Build PDFs"
inputs:
  tex-filename:
     required: true
     description: "The base name of the input  tex file without the .tex extension."

  output-filename:
    required: true
    description: "The base name of the output PDF file without the .pdf extension."

outputs:
  value:
    description: "Mirrors the output filename"
    value: ${{ inputs.output-filename }}

runs:
  using: "composite"
  steps:
    - name: Run LaTex in a Docker container
      uses: docker://texlive/texlive:TL2025-historic
      with:
        entrypoint: latexmk
        args: -lualatex -cd "${{ inputs.tex-filename }}.tex"

    - name: Rename PDF if a different output filename was set
      run: |
        if [ "${{ inputs.tex-filename }}" != "${{ inputs.output-filename }}" ]; then
          echo "Renaming '${{ inputs.tex-filename }}.pdf' to '${{ inputs.output-filename }}.pdf'."
          mv "${{ inputs.tex-filename }}.pdf" "${{ inputs.output-filename }}.pdf"
        fi
      shell: bash
