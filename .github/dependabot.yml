version: 2
# Comment added by request of GitHub support to regenerate the dependabot cache.
updates:
  - package-ecosystem: "github-actions"
    # Workflow files stored in the
    # default location of `.github/workflows`
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      # Prefix all commit messages with "[gha] "
      prefix: "[gha] "
